<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Air Canvas</title>
  
  <!-- MediaPipe Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <style>
    :root {
      --neon-pink: #ff2a5f;
      --neon-cyan: #05d9e8;
      --neon-green: #01ff70;
      --neon-yellow: #fefe00;
      --neon-purple: #9b51e0;
      --bg-dark: #0a0a0f;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    
    body {
      background-color: var(--bg-dark);
      color: #f0f0f5;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    /* Full-screen drawing canvas */
    #drawing-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      cursor: none; /* Hide standard cursor; we render a custom neon ring */
    }
    
    /* Top Control Bar with Glassmorphic design */
    .control-panel {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(15, 15, 25, 0.75);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 
                  0 0 20px rgba(5, 217, 232, 0.05);
    }
    
    .panel-title {
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .control-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .control-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.5);
    }
    
    /* Custom Color Picker & Presets */
    .color-picker-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .color-preset {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s, border-color 0.2s;
    }
    
    .color-preset:hover {
      transform: scale(1.15);
    }
    
    .color-preset.active {
      border-color: #ffffff;
      box-shadow: 0 0 10px currentColor;
    }
    
    #custom-color {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      width: 26px;
      height: 26px;
      background-color: transparent;
      border: none;
      cursor: pointer;
    }
    
    #custom-color::-webkit-color-swatch {
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }
    
    /* Brush slider */
    .slider {
      -webkit-appearance: none;
      width: 100px;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
    }
    
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--neon-cyan);
      box-shadow: 0 0 8px var(--neon-cyan);
      cursor: pointer;
    }
    
    /* Buttons */
    .btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: #ffffff;
    }
    
    .btn-clear:hover {
      border-color: var(--neon-pink);
      box-shadow: 0 0 10px rgba(255, 42, 95, 0.4);
      color: var(--neon-pink);
    }
    
    /* Floating webcam window (mirrored) */
    #webcam-container {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 220px;
      height: 165px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transform: scaleX(-1); /* Mirror camera stream */
      z-index: 10;
      background: #000;
    }
    
    #webcam-feed {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* Gesture Guide Panel */
    .legend-panel {
      position: absolute;
      left: 20px;
      bottom: 20px;
      z-index: 10;
      background: rgba(15, 15, 25, 0.75);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px;
      width: 210px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .legend-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      color: var(--neon-cyan);
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 0.75rem;
    }
    
    .legend-icon {
      font-size: 1.1rem;
      width: 24px;
      text-align: center;
    }
    
    /* Gesture Status Badge */
    .status-panel {
      position: absolute;
      top: 95px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(10, 10, 15, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    
    .status-draw {
      border-color: var(--neon-green);
      color: var(--neon-green);
      box-shadow: 0 0 10px rgba(1, 255, 112, 0.3);
    }
    .status-draw .status-dot {
      background-color: var(--neon-green);
      box-shadow: 0 0 8px var(--neon-green);
    }
    
    .status-erase {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      box-shadow: 0 0 10px rgba(255, 42, 95, 0.3);
    }
    .status-erase .status-dot {
      background-color: var(--neon-pink);
      box-shadow: 0 0 8px var(--neon-pink);
    }
    
    .status-pause {
      border-color: var(--neon-yellow);
      color: var(--neon-yellow);
      box-shadow: 0 0 10px rgba(254, 254, 0, 0.3);
    }
    .status-pause .status-dot {
      background-color: var(--neon-yellow);
      box-shadow: 0 0 8px var(--neon-yellow);
    }
    
    .status-none {
      border-color: rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.6);
    }
    .status-none .status-dot {
      background-color: rgba(255,255,255,0.4);
    }

    /* Custom Floating Target Cursor */
    #custom-cursor {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #ffffff;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 5;
      display: none;
      transition: width 0.1s, height 0.1s, border-color 0.1s;
    }

    /* Initial Loading Overlay */
    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      gap: 20px;
      transition: opacity 0.5s ease;
      text-align: center;
      padding: 20px;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(5, 217, 232, 0.1);
      border-top-color: var(--neon-cyan);
      border-radius: 50%;
      animation: spin 1s infinite linear;
      box-shadow: 0 0 15px rgba(5, 217, 232, 0.2);
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
    }

    /* Responsive scaling for mobile devices */
    @media (max-width: 768px) {
      .control-panel {
        flex-direction: column;
        width: 90%;
        gap: 12px;
        top: 10px;
        padding: 12px;
      }
      .panel-title {
        font-size: 1rem;
      }
      .control-group {
        width: 100%;
        justify-content: space-between;
      }
      .status-panel {
        top: 185px;
      }
      #webcam-container {
        width: 140px;
        height: 105px;
        bottom: 10px;
        right: 10px;
      }
      .legend-panel {
        display: none; /* Hide legend on small screens to avoid clutter */
      }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Requesting Camera Access...</div>
  </div>

  <!-- Drawing Canvas -->
  <canvas id="drawing-canvas"></canvas>
  
  <!-- Glowing Target Marker -->
  <div id="custom-cursor"></div>

  <!-- UI Control Panel -->
  <div class="control-panel">
    <div class="panel-title">Neon Air Paint</div>
    
    <!-- Color Presets + Picker -->
    <div class="control-group">
      <span class="control-label">Color</span>
      <div class="color-picker-container">
        <div class="color-preset active" data-color="#05d9e8" style="background-color: #05d9e8; color: #05d9e8;"></div>
        <div class="color-preset" data-color="#ff2a5f" style="background-color: #ff2a5f; color: #ff2a5f;"></div>
        <div class="color-preset" data-color="#01ff70" style="background-color: #01ff70; color: #01ff70;"></div>
        <div class="color-preset" data-color="#fefe00" style="background-color: #fefe00; color: #fefe00;"></div>
        <div class="color-preset" data-color="#9b51e0" style="background-color: #9b51e0; color: #9b51e0;"></div>
        <input type="color" id="custom-color" value="#05d9e8" title="Custom Color">
      </div>
    </div>
    
    <!-- Size Selector -->
    <div class="control-group">
      <span class="control-label">Brush</span>
      <input type="range" id="brush-size" class="slider" min="2" max="32" value="8">
      <span id="brush-size-val" style="font-size: 0.8rem; width: 25px;">8px</span>
    </div>
    
    <button id="clear-btn" class="btn btn-clear">Clear</button>
  </div>

  <!-- Real-time Gesture State Badge -->
  <div id="status-badge" class="status-panel status-none">
    <span class="status-dot"></span>
    <span id="status-text">Starting system...</span>
  </div>

  <!-- Floating Webcam Preview -->
  <div id="webcam-container">
    <video id="webcam-feed" autoplay playsinline></video>
  </div>

  <!-- Gesture Instruction Guide -->
  <div class="legend-panel">
    <div class="legend-title">Gesture Controls</div>
    <div class="legend-item">
      <span class="legend-icon">☝️</span>
      <span><strong>Index Finger Only:</strong> Draw</span>
    </div>
    <div class="legend-item">
      <span class="legend-icon">🖐️</span>
      <span><strong>Open Palm:</strong> Erase</span>
    </div>
    <div class="legend-item">
      <span class="legend-icon">✊</span>
      <span><strong>Closed Fist:</strong> Pause</span>
    </div>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">
    <div style="font-size: 0.65rem; color: rgba(255,255,255,0.4); line-height: 1.3;">
      Ensure your hand is in clear frame of the camera. Stand in decent lighting.
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('webcam-feed');
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');
    const cursor = document.getElementById('custom-cursor');
    const statusBadge = document.getElementById('status-badge');
    const statusText = document.getElementById('status-text');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.querySelector('.loading-text');

    // Drawing variables
    let currentColor = '#05d9e8';
    let brushSize = 8;
    let prevX = null;
    let prevY = null;
    let currentGesture = 'NONE';

    // Canvas size setup
    function setupCanvas() {
      // Backup current content before resizing
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.drawImage(canvas, 0, 0);

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // Restore backed up painting
      ctx.drawImage(tempCanvas, 0, 0);
    }
    
    setupCanvas();
    window.addEventListener('resize', setupCanvas);

    // Color controls
    const presets = document.querySelectorAll('.color-preset');
    const customColorInput = document.getElementById('custom-color');

    presets.forEach(preset => {
      preset.addEventListener('click', () => {
        presets.forEach(p => p.classList.remove('active'));
        preset.classList.add('active');
        currentColor = preset.dataset.color;
        customColorInput.value = currentColor;
      });
    });

    customColorInput.addEventListener('input', (e) => {
      currentColor = e.target.value;
      presets.forEach(p => p.classList.remove('active'));
    });

    // Brush slider controls
    const sizeSlider = document.getElementById('brush-size');
    const sizeValueSpan = document.getElementById('brush-size-val');

    sizeSlider.addEventListener('input', (e) => {
      brushSize = parseInt(e.target.value);
      sizeValueSpan.innerText = brushSize + 'px';
    });

    // Clear Canvas
    document.getElementById('clear-btn').addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    // MediaPipe Result Callback
    function onResults(results) {
      // Hide initial loading overlay once the first hand frame successfully updates
      if (loadingOverlay.style.opacity !== '0') {
        loadingOverlay.style.opacity = '0';
        setTimeout(() => loadingOverlay.style.display = 'none', 500);
      }

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];

        // Gesture Decision Matrix (based on relative Y of Tips compared to PIP joints)
        // 0-4 thumb, 5-8 index, 9-12 middle, 13-16 ring, 17-20 pinky
        const isIndexUp = landmarks[8].y < landmarks[6].y;
        const isMiddleUp = landmarks[12].y < landmarks[10].y;
        const isRingUp = landmarks[16].y < landmarks[14].y;
        const isPinkyUp = landmarks[20].y < landmarks[18].y;

        // Classify Gesture
        if (isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) {
          currentGesture = 'DRAW';
        } else if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
          currentGesture = 'ERASE';
        } else if (!isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) {
          currentGesture = 'PAUSE';
        } else {
          currentGesture = 'PAUSE'; // Default fallback state to prevent random line drawing
        }

        // Get index finger tip coordinates
        const indexTip = landmarks[8];
        // Mirror X-coordinate calculation to map perfectly to mirrored webcam CSS
        const cursorX = (1 - indexTip.x) * canvas.width;
        const cursorY = indexTip.y * canvas.height;

        // Update target cursor position
        cursor.style.display = 'block';
        cursor.style.left = `${cursorX}px`;
        cursor.style.top = `${cursorY}px`;

        // Execute drawing or erasing actions
        if (currentGesture === 'DRAW') {
          statusBadge.className = 'status-panel status-draw';
          statusText.innerText = 'Drawing';

          cursor.style.borderColor = currentColor;
          cursor.style.boxShadow = `0 0 15px ${currentColor}`;
          cursor.style.width = `${brushSize + 8}px`;
          cursor.style.height = `${brushSize + 8}px`;
          cursor.style.borderStyle = 'solid';

          if (prevX !== null && prevY !== null) {
            ctx.beginPath();
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Neon glow effect styling
            ctx.shadowBlur = brushSize * 1.8;
            ctx.shadowColor = currentColor;

            ctx.moveTo(prevX, prevY);
            ctx.lineTo(cursorX, cursorY);
            ctx.stroke();
          }
          prevX = cursorX;
          prevY = cursorY;

        } else if (currentGesture === 'ERASE') {
          statusBadge.className = 'status-panel status-erase';
          statusText.innerText = 'Erasing';

          const eraserSize = brushSize * 4;
          cursor.style.borderColor = 'var(--neon-pink)';
          cursor.style.boxShadow = '0 0 15px var(--neon-pink)';
          cursor.style.width = `${eraserSize}px`;
          cursor.style.height = `${eraserSize}px`;
          cursor.style.borderStyle = 'dashed';

          if (prevX !== null && prevY !== null) {
            ctx.beginPath();
            ctx.globalCompositeOperation = 'destination-out'; // Cut out shapes to transparent background
            ctx.lineWidth = eraserSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Disable shadowBlur during erase mode to prevent blurry artifacts
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';

            ctx.moveTo(prevX, prevY);
            ctx.lineTo(cursorX, cursorY);
            ctx.stroke();
          }
          prevX = cursorX;
          prevY = cursorY;

        } else if (currentGesture === 'PAUSE') {
          statusBadge.className = 'status-panel status-pause';
          statusText.innerText = 'Paused';

          cursor.style.borderColor = 'var(--neon-yellow)';
          cursor.style.boxShadow = '0 0 10px var(--neon-yellow)';
          cursor.style.width = '12px';
          cursor.style.height = '12px';
          cursor.style.borderStyle = 'solid';

          // Reset previous tracking points to prevent line jumping
          prevX = null;
          prevY = null;
        }

      } else {
        // No hand is visible in camera
        currentGesture = 'NONE';
        statusBadge.className = 'status-panel status-none';
        statusText.innerText = 'No Hand Detected';
        cursor.style.display = 'none';
        
        prevX = null;
        prevY = null;
      }
    }

    // MediaPipe Hand landmarker configuration
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    // Camera setup with error trapping
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({ image: videoElement });
      },
      width: 640,
      height: 480
    });

    camera.start().catch(err => {
      console.error("Camera initialisation error:", err);
      loadingText.innerHTML = `
        <span style="color: var(--neon-pink); font-weight: bold; font-size: 1.3rem;">Camera Access Blocked!</span><br>
        <span style="font-size: 0.85rem; text-transform: none; display: inline-block; margin-top: 10px; max-width: 400px; line-height: 1.5; color: rgba(255,255,255,0.7);">
          Webcams require a secure HTTP (localhost) context or standard HTTPS server to permit stream capture. Please verify your permissions and hosting protocol.
        </span>
      `;
      const spinner = document.querySelector('.spinner');
      if (spinner) spinner.style.display = 'none';
    });
  </script>
</body>
</html>
